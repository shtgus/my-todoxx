<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日待办清单</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: #ffffff;
      --ink: #1f2933;
      --muted: #7b8794;
      --line: #e8e1d7;
      --accent: #b7795f;
      --accent-dark: #8f563f;
      --accent-soft: #f0dfd4;
      --green: #6f8f72;
      --shadow: 0 24px 70px rgba(63, 45, 33, 0.12);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(183, 121, 95, 0.18), transparent 34rem),
        linear-gradient(135deg, #fbfaf8 0%, var(--bg) 52%, #efe7dc 100%);
    }

    button, input, textarea, select { font: inherit; }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .hero-card,
    .side-card,
    .workspace {
      border: 1px solid rgba(232, 225, 215, 0.9);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      min-height: 230px;
      border-radius: var(--radius-lg);
      padding: 34px;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      right: -90px;
      top: -110px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(183, 121, 95, 0.13);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 22px 0 12px;
      font-size: clamp(36px, 5vw, 62px);
      line-height: 1.02;
      letter-spacing: -0.06em;
    }

    .hero p {
      width: min(620px, 100%);
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.8;
    }

    .side-card {
      border-radius: var(--radius-lg);
      padding: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 24px;
    }

    .date-block time {
      display: block;
      font-size: 42px;
      font-weight: 750;
      letter-spacing: -0.04em;
    }

    .date-block span {
      color: var(--muted);
      font-size: 14px;
    }

    .quote {
      margin: 0;
      padding: 18px;
      color: var(--accent-dark);
      background: #fff8f4;
      border: 1px solid #f0dfd4;
      border-radius: var(--radius-md);
      line-height: 1.65;
    }

    .workspace {
      display: grid;
      grid-template-columns: 310px minmax(0, 1fr);
      gap: 0;
      min-height: 610px;
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .sidebar {
      padding: 24px;
      border-right: 1px solid var(--line);
      background: rgba(255, 252, 248, 0.64);
    }

    .section-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .stats {
      display: grid;
      gap: 10px;
      margin-bottom: 26px;
    }

    .stat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }

    .stat strong { font-size: 28px; letter-spacing: -0.04em; }
    .stat span { color: var(--muted); font-size: 13px; }

    .filters { display: grid; gap: 8px; }

    .filter-btn {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 0;
      padding: 13px 14px;
      color: var(--ink);
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .count-pill {
      min-width: 28px;
      padding: 3px 8px;
      color: var(--accent-dark);
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .main {
      display: flex;
      flex-direction: column;
      padding: 24px;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) 145px 128px 160px 92px;
      gap: 10px;
      padding: 10px;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }

    .field {
      width: 100%;
      border: 0;
      outline: 0;
      padding: 13px 12px;
      color: var(--ink);
      background: #faf8f5;
      border-radius: var(--radius-sm);
    }

    .field:focus {
      box-shadow: 0 0 0 2px rgba(183, 121, 95, 0.25);
      background: #fff;
    }

    .add-btn {
      border: 0;
      color: white;
      background: var(--accent);
      border-radius: var(--radius-sm);
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .add-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .toolbar h2 { margin: 0; font-size: 20px; letter-spacing: -0.02em; }

    .clear-btn {
      border: 1px solid var(--line);
      padding: 9px 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.62);
      border-radius: 999px;
      cursor: pointer;
    }

    .todo-list {
      display: grid;
      gap: 10px;
      padding: 2px;
      overflow: auto;
    }

    .todo-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      transition: 0.2s ease;
    }

    .todo-item:hover { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(63, 45, 33, 0.08); }
    .todo-item.done { opacity: 0.62; }
    .todo-item.done .todo-title { text-decoration: line-through; color: var(--muted); }

    .check {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      accent-color: var(--green);
      cursor: pointer;
    }

    .todo-title {
      margin: 0 0 8px;
      font-weight: 760;
      line-height: 1.45;
      word-break: break-word;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      padding: 4px 8px;
      background: #f6efe8;
      border-radius: 999px;
    }

    .priority-high { color: #a94737; background: #fae5de; }
    .priority-medium { color: #8f6b2f; background: #f6ead0; }
    .priority-low { color: #4f7553; background: #e4efdf; }

    .delete-btn {
      border: 0;
      padding: 8px 10px;
      color: var(--muted);
      background: transparent;
      border-radius: 10px;
      cursor: pointer;
    }

    .delete-btn:hover { color: #a94737; background: #fae5de; }

    .notes {
      margin-top: 16px;
      padding: 16px;
      background: #fff8f4;
      border: 1px solid #f0dfd4;
      border-radius: var(--radius-md);
    }

    textarea.field {
      min-height: 84px;
      resize: vertical;
      line-height: 1.65;
    }

    .empty {
      padding: 58px 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.45);
    }

    @media (max-width: 900px) {
      .hero,
      .workspace { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .composer { grid-template-columns: 1fr 1fr; }
      .add-btn { min-height: 46px; }
    }

    @media (max-width: 560px) {
      .page { width: min(100% - 20px, 1180px); padding: 10px 0; }
      .hero-card, .side-card, .main, .sidebar { padding: 18px; }
      .composer { grid-template-columns: 1fr; }
      .todo-item { grid-template-columns: auto minmax(0, 1fr); }
      .delete-btn { grid-column: 2; justify-self: start; padding-left: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="今日概览">
      <div class="hero-card">
        <span class="eyebrow">✦ Daily Desk</span>
        <h1>今日事，今日必。</h1>
        <p>适合展会海外市场的每日待办页：客户跟进、展商资料、邮件邀约、物流物料、内容发布与复盘都可以轻量记录，并自动保存在当前浏览器。</p>
      </div>
      <aside class="side-card">
        <div class="date-block">
          <time id="clock">--:--</time>
          <span id="todayText">今天</span>
        </div>
        <p class="quote">今日重点：先完成最能推动展会转化的一件事，再处理零散消息。</p>
      </aside>
    </section>

    <section class="workspace" aria-label="每日待办应用">
      <aside class="sidebar">
        <p class="section-title">Progress</p>
        <div class="stats" aria-label="任务统计">
          <div class="stat"><span>待完成</span><strong id="pendingStat">0</strong></div>
          <div class="stat"><span>已完成</span><strong id="doneStat">0</strong></div>
          <div class="stat"><span>完成率</span><strong id="rateStat">0%</strong></div>
        </div>

        <p class="section-title">Views</p>
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">全部任务 <span class="count-pill" id="countAll">0</span></button>
          <button class="filter-btn" data-filter="today">今日事项 <span class="count-pill" id="countToday">0</span></button>
          <button class="filter-btn" data-filter="high">高优先级 <span class="count-pill" id="countHigh">0</span></button>
          <button class="filter-btn" data-filter="done">已完成 <span class="count-pill" id="countDone">0</span></button>
        </div>
      </aside>

      <section class="main">
        <form class="composer" id="todoForm">
          <input class="field" id="taskInput" autocomplete="off" placeholder="例如：确认德国代理商邀约名单" required />
          <select class="field" id="categoryInput" aria-label="任务类型">
            <option>客户跟进</option>
            <option>展会筹备</option>
            <option>内容推广</option>
            <option>物料物流</option>
            <option>数据复盘</option>
          </select>
          <select class="field" id="priorityInput" aria-label="优先级">
            <option value="high">高优先级</option>
            <option value="medium" selected>普通</option>
            <option value="low">低优先级</option>
          </select>
          <input class="field" id="dueDateInput" type="date" aria-label="完成时间" required />
          <button class="add-btn" type="submit">添加</button>
        </form>

        <div class="toolbar">
          <h2 id="listTitle">全部任务</h2>
          <button class="clear-btn" id="clearDoneBtn" type="button">清除已完成</button>
        </div>

        <div class="todo-list" id="todoList" aria-live="polite"></div>

        <div class="notes">
          <p class="section-title">Daily Note</p>
          <textarea class="field" id="dailyNote" placeholder="记录今日沟通要点、展会线索、需要明天继续推进的事项……"></textarea>
        </div>
      </section>
    </section>
  </main>

  <script>
    const storageKey = "expo_market_daily_todos";
    const noteKey = "expo_market_daily_note";
    const listTitleMap = {
      all: "全部任务",
      today: "今日事项",
      high: "高优先级",
      done: "已完成"
    };
    const priorityMap = {
      high: { label: "高", className: "priority-high" },
      medium: { label: "普通", className: "priority-medium" },
      low: { label: "低", className: "priority-low" }
    };

    let activeFilter = "all";
    let todos = JSON.parse(localStorage.getItem(storageKey) || "[]");

    const $ = (selector) => document.querySelector(selector);
    const todayISO = () => new Date().toISOString().slice(0, 10);
    const getDueDate = (todo) => todo.dueDate || todo.date || todayISO();

    function formatDueDate(dateValue) {
      if (dateValue === todayISO()) return "今天";
      return dateValue;
    }

    function saveTodos() {
      localStorage.setItem(storageKey, JSON.stringify(todos));
    }

    function renderClock() {
      const now = new Date();
      $("#clock").textContent = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
      $("#todayText").textContent = now.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
    }

    function getVisibleTodos() {
      if (activeFilter === "today") return todos.filter((todo) => getDueDate(todo) === todayISO() && !todo.done);
      if (activeFilter === "high") return todos.filter((todo) => todo.priority === "high" && !todo.done);
      if (activeFilter === "done") return todos.filter((todo) => todo.done);
      return todos;
    }

    function updateStats() {
      const done = todos.filter((todo) => todo.done).length;
      const pending = todos.length - done;
      const todayCount = todos.filter((todo) => getDueDate(todo) === todayISO() && !todo.done).length;
      const highCount = todos.filter((todo) => todo.priority === "high" && !todo.done).length;
      const rate = todos.length ? Math.round((done / todos.length) * 100) : 0;

      $("#pendingStat").textContent = pending;
      $("#doneStat").textContent = done;
      $("#rateStat").textContent = `${rate}%`;
      $("#countAll").textContent = todos.length;
      $("#countToday").textContent = todayCount;
      $("#countHigh").textContent = highCount;
      $("#countDone").textContent = done;
    }

    function renderTodos() {
      const list = $("#todoList");
      const visibleTodos = getVisibleTodos();
      $("#listTitle").textContent = listTitleMap[activeFilter];

      if (!visibleTodos.length) {
        list.innerHTML = `<div class="empty">当前视图没有待办。添加一条任务，或切换左侧筛选。</div>`;
        updateStats();
        return;
      }

      list.innerHTML = visibleTodos.map((todo) => {
        const priority = priorityMap[todo.priority] || priorityMap.medium;
        const dueDate = getDueDate(todo);
        return `
          <article class="todo-item ${todo.done ? "done" : ""}">
            <input class="check" type="checkbox" ${todo.done ? "checked" : ""} aria-label="切换任务状态" data-action="toggle" data-id="${todo.id}" />
            <div>
              <p class="todo-title">${escapeHTML(todo.title)}</p>
              <div class="meta">
                <span class="tag">${escapeHTML(todo.category)}</span>
                <span class="tag ${priority.className}">${priority.label}</span>
                <span class="tag">完成：${formatDueDate(dueDate)}</span>
              </div>
            </div>
            <button class="delete-btn" type="button" data-action="delete" data-id="${todo.id}">删除</button>
          </article>
        `;
      }).join("");

      updateStats();
    }

    function escapeHTML(value) {
      return value.replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }

    $("#todoForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const title = $("#taskInput").value.trim();
      if (!title) return;

      todos.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        title,
        category: $("#categoryInput").value,
        priority: $("#priorityInput").value,
        dueDate: $("#dueDateInput").value,
        date: todayISO(),
        done: false
      });

      $("#taskInput").value = "";
      $("#dueDateInput").value = todayISO();
      saveTodos();
      renderTodos();
    });

    $("#todoList").addEventListener("click", (event) => {
      const actionTarget = event.target.closest("[data-action]");
      if (!actionTarget) return;
      const { action, id } = actionTarget.dataset;

      if (action === "toggle") {
        todos = todos.map((todo) => todo.id === id ? { ...todo, done: !todo.done } : todo);
      }

      if (action === "delete") {
        todos = todos.filter((todo) => todo.id !== id);
      }

      saveTodos();
      renderTodos();
    });

    $("#filters").addEventListener("click", (event) => {
      const button = event.target.closest(".filter-btn");
      if (!button) return;
      activeFilter = button.dataset.filter;
      document.querySelectorAll(".filter-btn").forEach((item) => item.classList.toggle("active", item === button));
      renderTodos();
    });

    $("#clearDoneBtn").addEventListener("click", () => {
      todos = todos.filter((todo) => !todo.done);
      saveTodos();
      renderTodos();
    });

    $("#dueDateInput").value = todayISO();

    $("#dailyNote").value = localStorage.getItem(noteKey) || "";
    $("#dailyNote").addEventListener("input", (event) => localStorage.setItem(noteKey, event.target.value));

    renderClock();
    setInterval(renderClock, 1000);
    renderTodos();
  </script>
</body>
</html>
